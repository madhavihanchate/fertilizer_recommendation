<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fertilizer Recommendation System</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f7fa;color:#1a202c;padding:2rem;max-width:960px;margin:0 auto;line-height:1.6}
  h1{font-size:1.5rem;margin-bottom:.25rem;color:#1a365d}
  .subtitle{color:#4a5568;margin-bottom:1.5rem;font-size:.9rem}
  .card{background:#fff;border-radius:10px;padding:1.5rem;margin-bottom:1.25rem;box-shadow:0 1px 4px rgba(0,0,0,.08)}
  label{display:block;font-weight:600;font-size:.85rem;margin-bottom:.3rem;color:#2d3748}
  select,input[type=text],input[type=number]{width:100%;padding:.55rem .75rem;border:1px solid #d1d5db;border-radius:6px;font-size:.9rem;margin-bottom:1rem;background:#fff}
  select:focus,input:focus{outline:none;border-color:#4299e1;box-shadow:0 0 0 3px rgba(66,153,225,.15)}
  .btn{display:inline-block;padding:.6rem 1.5rem;border-radius:6px;font-weight:600;font-size:.9rem;border:none;cursor:pointer;text-decoration:none}
  .btn-primary{background:#2b6cb0;color:#fff}
  .btn-primary:hover{background:#2c5282}
  .btn-secondary{background:#e2e8f0;color:#2d3748}
  .btn-secondary:hover{background:#cbd5e0}
  table{width:100%;border-collapse:collapse;font-size:.85rem}
  th,td{padding:.6rem .75rem;text-align:left;border-bottom:1px solid #e2e8f0}
  th{background:#f7fafc;font-weight:600;color:#2d3748}
  .pill{display:inline-block;padding:.15rem .6rem;border-radius:999px;font-size:.75rem;font-weight:600}
  .pill-low,.pill-deficient{background:#fed7d7;color:#9b2c2c}
  .pill-medium,.pill-marginal{background:#fefcbf;color:#975a16}
  .pill-high,.pill-sufficient{background:#c6f6d5;color:#276749}
  .fertilizer-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
  .fert-card{background:#ebf8ff;border:1px solid #bee3f8;border-radius:8px;padding:1rem;text-align:center}
  .fert-card h3{font-size:.8rem;color:#2b6cb0;margin-bottom:.3rem}
  .fert-card .value{font-size:1.3rem;font-weight:700;color:#1a365d}
  .fert-card .unit{font-size:.75rem;color:#4a5568}
  .note{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:1rem;font-size:.85rem;color:#92400e;margin-top:1rem}
  .btn-group{display:flex;gap:.75rem;flex-wrap:wrap;margin-top:.5rem}
  .btn-group .btn{flex:1;min-width:120px;text-align:center}
  .radio-group{display:flex;gap:1.5rem;margin:1rem 0}
  .radio-group label{font-weight:400;display:flex;align-items:center;gap:.4rem}
  .radio-group input[type=radio]{width:auto;margin:0}
  .chart-container{max-width:500px;margin:1.5rem auto}
  .error{background:#fed7d7;color:#9b2c2c;padding:.75rem;border-radius:6px;margin-bottom:1rem;font-size:.85rem}
</style>
</head>
<body>
<h1>Fertilizer Recommendation System</h1>
<p class="subtitle">Rule-Based Soil Test Analysis &amp; Fertilizer Advisory</p>
{% block content %}{% endblock %}
</body>
</html>
